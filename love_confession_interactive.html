
<style>
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes pop { 0%{transform:scale(1)} 30%{transform:scale(1.4)} 60%{transform:scale(0.9)} 100%{transform:scale(1)} }
  @keyframes glow { 0%,100%{opacity:0.6} 50%{opacity:1} }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  #wrapper {
    min-height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 2rem;
    background: transparent;
  }

  .petal {
    position: fixed;
    font-size: 18px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 999;
  }

  #card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-xl);
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    animation: fadeIn 0.8s ease;
    position: relative;
    z-index: 2;
  }

  #heart-svg {
    width: 80px;
    height: 80px;
    margin: 0 auto 1.2rem;
    animation: float 3s ease-in-out infinite;
    display: block;
  }

  #main-text {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 0.5rem;
    line-height: 1.4;
  }

  #sub-text {
    font-size: 14px;
    color: var(--color-text-secondary);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  #yes-btn {
    padding: 12px 32px;
    border-radius: 999px;
    border: 0.5px solid #D4537E;
    background: #FBEAF0;
    color: #993556;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }
  #yes-btn:hover { background: #F4C0D1; transform: scale(1.05); }
  #yes-btn:active { transform: scale(0.97); }

  #no-btn {
    padding: 12px 28px;
    border-radius: 999px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    font-size: 16px;
    font-weight: 400;
    cursor: pointer;
    transition: transform 0.15s, font-size 0.2s, padding 0.2s;
    white-space: nowrap;
  }
  #no-btn:hover { background: var(--color-background-tertiary); }

  #result-view {
    display: none;
    animation: fadeIn 0.6s ease;
    text-align: center;
  }

  #result-heart {
    font-size: 60px;
    display: block;
    margin: 0 auto 1rem;
    animation: heartbeat 0.8s ease infinite;
  }

  #result-title {
    font-size: 24px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 0.5rem;
  }

  #result-sub {
    font-size: 14px;
    color: var(--color-text-secondary);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }

  #code-block {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 1rem;
    font-family: var(--font-mono);
    font-size: 12px;
    color: #D4537E;
    text-align: left;
    line-height: 1.8;
    margin-bottom: 1.5rem;
    white-space: pre;
  }

  #restart-btn {
    font-size: 13px;
    color: var(--color-text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .star {
    position: fixed;
    pointer-events: none;
    font-size: 16px;
    animation: glow 2s ease-in-out infinite;
    z-index: 1;
    color: #ED93B1;
    opacity: 0.4;
  }
</style>

<div id="wrapper">
  <div class="star" style="top:8%;left:7%;animation-delay:0s">✦</div>
  <div class="star" style="top:14%;right:9%;animation-delay:0.7s">✦</div>
  <div class="star" style="bottom:18%;left:12%;animation-delay:1.2s">✦</div>
  <div class="star" style="bottom:10%;right:8%;animation-delay:0.3s">✦</div>

  <div id="card">
    <svg id="heart-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 80 C20 58 5 42 5 28 C5 16 14 8 24 8 C34 8 42 16 50 26 C58 16 66 8 76 8 C86 8 95 16 95 28 C95 42 80 58 50 80Z" fill="#ED93B1" opacity="0.9"/>
      <path d="M35 30 C35 25 28 22 26 28" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    </svg>

    <div id="main-view">
      <p id="main-text">你愿意和我在一起吗？</p>
      <p id="sub-text">认识你以来，每一天都变得不一样了<br>我想和你一起，慢慢走下去 ♡</p>
      <div class="btn-row">
        <button id="yes-btn" onclick="handleYes()">愿意 ♡</button>
        <button id="no-btn" onclick="handleNo()">再想想…</button>
      </div>
    </div>

    <div id="result-view">
      <span id="result-heart">♡</span>
      <p id="result-title">太好了！</p>
      <p id="result-sub">从今天起，你就是我的人了<br>我会好好珍惜你的每一天 ✨</p>
      <div id="code-block">if (你愿意):
    我们 = 在一起()
    print("❤️ 在一起啦！")</div>
      <button id="restart-btn" onclick="restart()">重新表白一次</button>
    </div>
  </div>
</div>

<script>
  let noCount = 0;
  const noTexts = ["再想想…", "真的不要吗？", "再考虑一下嘛", "求你了！", "就这一次机会哦", "好吧…（默默哭泣）"];
  const yesTexts = ["愿意 ♡", "愿意！♡", "当然愿意啦 ♡"];

  function handleNo() {
    noCount++;
    const noBtn = document.getElementById('no-btn');
    const yesBtn = document.getElementById('yes-btn');

    noBtn.textContent = noTexts[Math.min(noCount, noTexts.length - 1)];
    noBtn.style.animation = 'shake 0.4s ease';
    setTimeout(() => noBtn.style.animation = '', 400);

    const yesFontSize = Math.min(16 + noCount * 3, 28);
    const yesPadding = Math.min(12 + noCount * 4, 30);
    yesBtn.style.fontSize = yesFontSize + 'px';
    yesBtn.style.padding = yesPadding + 'px ' + (32 + noCount * 6) + 'px';
    yesBtn.textContent = yesTexts[Math.min(noCount - 1, yesTexts.length - 1)] || '愿意 ♡';
    yesBtn.style.animation = 'pop 0.4s ease';
    setTimeout(() => yesBtn.style.animation = '', 400);

    if (noCount >= 5) {
      noBtn.style.display = 'none';
    }
  }

  function handleYes() {
    document.getElementById('main-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'block';
    spawnPetals();
    document.getElementById('heart-svg').style.animation = 'heartbeat 0.6s ease infinite';
  }

  function spawnPetals() {
    const petals = ['🌸', '💕', '✨', '🌷', '💗', '🌹'];
    for (let i = 0; i < 28; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'petal';
        el.textContent = petals[Math.floor(Math.random() * petals.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-30px';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        el.style.fontSize = (14 + Math.random() * 14) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5500);
      }, i * 80);
    }
  }

  function restart() {
    noCount = 0;
    const yesBtn = document.getElementById('yes-btn');
    const noBtn = document.getElementById('no-btn');
    yesBtn.textContent = '愿意 ♡';
    yesBtn.style.fontSize = '16px';
    yesBtn.style.padding = '12px 32px';
    noBtn.textContent = '再想想…';
    noBtn.style.display = '';
    document.getElementById('main-view').style.display = 'block';
    document.getElementById('result-view').style.display = 'none';
    document.getElementById('heart-svg').style.animation = 'float 3s ease-in-out infinite';
  }
</script>
